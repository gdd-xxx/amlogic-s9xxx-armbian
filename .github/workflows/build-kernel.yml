name: Build custom RK3568 kernel for YF-023D

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version to build"
        required: false
        default: "6.12.y"
        type: choice
        options:
          - 6.12.y
          - 6.18.y
          - 6.6.y

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential flex bison libssl-dev libelf-dev \
            gcc-aarch64-linux-gnu bc python3 \
            device-tree-compiler lz4 libncurses-dev

      - name: Download kernel source
        run: |
          cd /tmp
          curl -fsSL -o kernel.tar.gz \
            "https://github.com/ophub/linux-${{ inputs.kernel_version }}/archive/refs/heads/main.tar.gz"
          mkdir -p /tmp/kernel
          tar xzf kernel.tar.gz -C /tmp/kernel --strip-components=1
          echo "Kernel source downloaded"

      - name: Add MAE0621 PHY driver
        run: |
          cd /tmp/kernel
          cp "${{ github.workspace }}/drivers/net/phy/maxio.c" drivers/net/phy/
          
          # Add to Kconfig
          if ! grep -q "config MAXIO_PHY" drivers/net/phy/Kconfig; then
            cat >> drivers/net/phy/Kconfig << 'EOF'
          config MAXIO_PHY
              tristate "Maxio MAE0621 PHYs"
              depends on PHYLIB
              help
                Currently supports the Maxio MAE0621A Q2C and Q3C PHYs.
                These are Gigabit Ethernet PHYs manufactured by Maxio Technology.
          EOF
          fi
          
          # Add to Makefile
          if ! grep -q "maxio" drivers/net/phy/Makefile; then
            echo "obj-\$(CONFIG_MAXIO_PHY) += maxio.o" >> drivers/net/phy/Makefile
          fi
          
          echo "MAE0621 driver added"

      - name: Add custom DTS
        run: |
          cd /tmp/kernel
          cp "${{ github.workspace }}/dts/rk3568-yf-023d-v6.dts" \
            arch/arm64/boot/dts/rockchip/
          
          # Add to Makefile
          if ! grep -q "rk3568-yf-023d-v6" arch/arm64/boot/dts/rockchip/Makefile; then
            echo "dtb-\$(CONFIG_ARCH_ROCKCHIP) += rk3568-yf-023d-v6.dtb" \
              >> arch/arm64/boot/dts/rockchip/Makefile
          fi
          
          echo "Custom DTS added"

      - name: Configure kernel
        run: |
          cd /tmp/kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          
          # Enable MAE0621 driver
          scripts/config --enable CONFIG_MAXIO_PHY
          
          # Ensure RK3568 support
          scripts/config --enable CONFIG_ARCH_ROCKCHIP
          scripts/config --enable CONFIG_SMP
          scripts/config --enable CONFIG_CPUFREQ_DT
          
          # Enable common features
          scripts/config --enable CONFIG_EXT4_FS
          scripts/config --enable CONFIG_BTRFS_FS
          scripts/config --enable CONFIG_NFS_FS
          scripts/config --enable CONFIG_USB_DWC3
          scripts/config --enable CONFIG_USB_DWC3_OF_SIMPLE
          scripts/config --enable CONFIG_USB_XHCI_HCD
          scripts/config --enable CONFIG_MMC_SDHCI_OF_DWCMSHC
          
          # Enable GPU/NPU/VPU
          scripts/config --enable CONFIG_DRM_PANFROST
          scripts/config --enable CONFIG_ROCKCHIP_RKNPU
          scripts/config --enable CONFIG_ROCKCHIP_VDEC2
          scripts/config --enable CONFIG_ROCKCHIP_VCODEC
          
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          echo "Kernel configured"

      - name: Compile kernel
        run: |
          cd /tmp/kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            -j$(nproc) Image modules dtbs 2>&1 | tee /tmp/build.log
          echo "Build completed"

      - name: Package kernel
        run: |
          cd /tmp/kernel
          mkdir -p /tmp/output/dtb /tmp/output/modules
          
          # Copy DTBs
          find arch/arm64/boot/dts/rockchip -name "*.dtb" -exec cp {} /tmp/output/dtb/ \;
          
          # Copy kernel image
          cp arch/arm64/boot/Image /tmp/output/
          
          # Install modules
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            INSTALL_MOD_PATH=/tmp/output/modules modules_install
          
          # Create tarball
          cd /tmp/output
          tar czf "${{ github.workspace }}/kernel-rk3568-yf023d.tar.gz" *
          echo "Package created"

      - name: Upload kernel
        uses: softprops/action-gh-release@v1
        with:
          tag_name: kernel-yf023d
          name: "RK3568 YF-023D Kernel ${{ inputs.kernel_version }}"
          body: |
            Custom kernel for Young-Feel YF-023D v6 RK3568 Board
            
            Features:
            - MAE0621A Ethernet PHY driver
            - Custom DTS for YF-023D
            - NPU/VPU/USB support
            
            Default login: root / 1234
          files: kernel-rk3568-yf023d.tar.gz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
