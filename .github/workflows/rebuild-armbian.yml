name: Build Armbian for YF-023D (rock-3b base)

on:
  workflow_dispatch:

env:
  TZ: Etc/UTC

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          MATRIX='{"include":[{"release":"bookworm"},{"release":"trixie"}]}'
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

  build:
    needs: setup
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    name: build-${{ matrix.release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk
        id: disk
        run: |
          root_avail=$(df --block-size=1G / | tail -1 | awk '{print $4}')
          root_size=$(( root_avail - 4 ))
          [[ "${root_size}" -gt 0 ]] || { echo "Error: Insufficient space"; exit 1; }
          sudo truncate -s "${root_size}"G /root.img
          build_dev=$(sudo losetup --find --show /root.img)
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 "${build_dev}"
          sudo mkdir -p /builder
          sudo mount "${build_dev}" /builder
          sudo chown -R runner:runner /builder
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Build Armbian with rock-3b board (includes proper u-boot)
        uses: ophub/amlogic-s9xxx-armbian@main
        if: ${{ steps.disk.outputs.status == 'success' && !cancelled() }}
        with:
          build_target: armbian
          armbian_path: build/output/images/*.img.gz
          armbian_board: rock-3b
          armbian_kernel: 6.12.y
          auto_kernel: true
          kernel_repo: ophub/kernel
          kernel_usage: stable
          armbian_fstype: ext4
          builder_name: yf023d

      - name: Replace DTB and update boot config
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        run: |
          echo "=== Current output ==="
          ls -lh ${{ env.PACKAGED_OUTPUTPATH }}/ 2>/dev/null

          # Find the Armbian image
          IMG_FILE=$(find ${{ env.PACKAGED_OUTPUTPATH }} -name "*.img.gz" | head -1)
          if [ -z "$IMG_FILE" ]; then
            echo "ERROR: No image found"
            exit 1
          fi
          echo "Image: ${IMG_FILE}"

          # Decompress
          cp "${IMG_FILE}" /tmp/work.img.gz
          gzip -d /tmp/work.img.gz

          # Mount and modify
          LOOP=$(sudo losetup -fP --show /tmp/work.img)
          sudo partprobe "${LOOP}"

          # Mount rootfs
          sudo mkdir -p /mnt/rootfs
          sudo mount "${LOOP}p2" /mnt/rootfs

          # Mount boot
          sudo mkdir -p /mnt/boot
          sudo mount "${LOOP}p1" /mnt/boot

          echo "=== Boot ==="
          sudo ls -la /mnt/boot/

          # Find our custom DTB
          DTB_SRC=$(find ${{ github.workspace }} -name "rk3568-yf-023d-v6.dtb" 2>/dev/null | head -1)
          if [ -z "$DTB_SRC" ]; then
            # Compile from DTS
            DTS_SRC=$(find ${{ github.workspace }} -name "rk3568-yf-023d-v6.dts" 2>/dev/null | head -1)
            if [ -n "$DTS_SRC" ]; then
              echo "Compiling DTS..."
              sudo apt-get install -y device-tree-compiler
              dtc -I dts -O dtb -o /tmp/rk3568-yf-023d-v6.dtb "${DTS_SRC}"
              DTB_SRC="/tmp/rk3568-yf-023d-v6.dtb"
            fi
          fi

          if [ -n "$DTB_SRC" ]; then
            echo "Replacing DTB: ${DTB_SRC}"
            sudo cp "${DTB_SRC}" /mnt/boot/dtb/rockchip/rk3568-yf-023d-v6.dtb
          else
            echo "WARNING: No custom DTB found, keeping rock-3b DTB"
          fi

          # Update boot config to point to our DTB
          for conf in /mnt/boot/armbianEnv.txt /mnt/boot/extlinux/extlinux.conf; do
            if [ -f "$conf" ]; then
              echo "Updating $conf"
              sudo sed -i 's|fdtfile=rockchip/rk3568-rock-3b.dtb|fdtfile=rockchip/rk3568-yf-023d-v6.dtb|g' "$conf" 2>/dev/null || true
              sudo sed -i 's|FDT /dtb/rockchip/rk3568-rock-3b.dtb|FDT /dtb/rockchip/rk3568-yf-023d-v6.dtb|g' "$conf" 2>/dev/null || true
              cat "$conf"
            fi
          done

          # Cleanup
          sudo umount /mnt/boot 2>/dev/null
          sudo umount /mnt/rootfs 2>/dev/null
          sudo losetup -d "${LOOP}"

          # Recompress
          gzip -9 /tmp/work.img
          mv /tmp/work.img.gz "${IMG_FILE}"
          echo "DTB replaced and boot config updated"

      - name: Upload
        uses: softprops/action-gh-release@v1
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag_name: armbian-yf023d-${{ matrix.release }}
          name: "Armbian ${{ matrix.release }} for YF-023D (RK3568)"
          body: |
            Armbian for Young-Feel YF-023D v6 RK3568 Board
            
            Based on Rock-3B image (proper u-boot for RK3568)
            Custom DTB: rk3568-yf-023d-v6.dtb
            Kernel: 6.12.y (stable)
            
            Default login: root / 1234
            Install: armbian-install
          files: ${{ env.PACKAGED_OUTPUTPATH }}/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
