name: Build Armbian for YF-023D

on:
  workflow_dispatch:

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Armbian base image
        run: |
          mkdir -p /tmp/work
          ARMBIAN_TAG="Armbian_bookworm_arm64_server_2026.06"
          ARMBIAN_FILE="Armbian_26.05.0-trunk_bookworm_arm64_6.18.33.img.gz"
          echo "Downloading ${ARMBIAN_FILE}..."
          curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "https://github.com/ophub/amlogic-s9xxx-armbian/releases/download/${ARMBIAN_TAG}/${ARMBIAN_FILE}" \
            -o /tmp/work/base.img.gz
          ls -lh /tmp/work/base.img.gz
          gzip -d /tmp/work/base.img.gz
          echo "Base image ready"

      - name: Download custom kernel
        run: |
          mkdir -p /tmp/kernel-pkg
          curl -fsSL -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://github.com/gdd-xxx/amlogic-s9xxx-armbian/releases/download/kernel-yf023d/kernel-rk3568-yf023d.tar.gz" \
            -o /tmp/kernel-pkg/custom.tar.gz
          ls -lh /tmp/kernel-pkg/custom.tar.gz
          mkdir -p /tmp/kernel-extract
          tar xzf /tmp/kernel-pkg/custom.tar.gz -C /tmp/kernel-extract/
          echo "Kernel extracted"
          find /tmp/kernel-extract -type f | head -30

      - name: Build custom image
        run: |
          IMG="/tmp/work/base.img"

          # Get partition info
          echo "=== Partition table ==="
          parted -s "${IMG}" unit s print

          # Find Linux partitions
          BOOT_START=$(parted -s "${IMG}" unit s print | grep "^.*1.*fat32\|^.*1.*fat16\|^.*1.*boot" | awk '{print $2}' | sed 's/s$//')
          ROOT_START=$(parted -s "${IMG}" unit s print | grep "^.*2.*ext4\|^.*2.*linux-swap" | awk '{print $2}' | sed 's/s$//')

          # Fallback: assume standard layout
          if [ -z "$BOOT_START" ]; then
              # Use loset to detect
              LOOP=$(sudo losetup -fP --show "${IMG}")
              sudo partprobe "${LOOP}"
              BOOT_START=$(sudo fdisk -l "${IMG}" | grep "${LOOP}p1" | awk '{print $2}')
              ROOT_START=$(sudo fdisk -l "${IMG}" | grep "${LOOP}p2" | awk '{print $2}')
          fi

          echo "Boot start: ${BOOT_START}"
          echo "Root start: ${ROOT_START}"

          # Use loset with partition scanning
          LOOP=$(sudo losetup -fP --show "${IMG}")
          echo "Loop: ${LOOP}"

          sudo mkdir -p /mnt/boot /mnt/rootfs

          # Mount partitions
          if [ -b "${LOOP}p1" ]; then
              sudo mount "${LOOP}p1" /mnt/boot
          elif [ -b "${LOOP}1" ]; then
              sudo mount "${LOOP}1" /mnt/boot
          fi

          if [ -b "${LOOP}p2" ]; then
              sudo mount "${LOOP}p2" /mnt/rootfs
          elif [ -b "${LOOP}2" ]; then
              sudo mount "${LOOP}2" /mnt/rootfs
          fi

          echo "=== Boot ==="
          ls -la /mnt/boot/ 2>/dev/null | head -20
          echo "=== Rootfs ==="
          ls -la /mnt/rootfs/ 2>/dev/null | head -20

          # Find boot directory with kernel
          BOOT_DIR="/mnt/boot"
          if [ -d "/mnt/boot/dtb" ] || [ -f "/mnt/boot/Image" ]; then
              BOOT_DIR="/mnt/boot"
          elif [ -d "/mnt/boot/extlinux" ]; then
              BOOT_DIR="/mnt/boot"
          fi

          # Find existing kernel version
          KVER=$(ls /mnt/rootfs/lib/modules/ 2>/dev/null | head -1)
          echo "Existing kernel: ${KVER}"

          # Find kernel version from our custom kernel
          NEW_KVER=$(ls /tmp/kernel-extract/lib/modules/ 2>/dev/null | head -1)
          echo "New kernel: ${NEW_KVER}"

          # Backup and replace Image
          if [ -f "${BOOT_DIR}/Image" ]; then
              sudo mv "${BOOT_DIR}/Image" "${BOOT_DIR}/Image.old"
          fi
          NEW_IMAGE=$(find /tmp/kernel-extract -name "Image" -type f | head -1)
          if [ -n "$NEW_IMAGE" ]; then
              sudo cp "$NEW_IMAGE" "${BOOT_DIR}/Image"
              echo "Replaced Image"
          else
              echo "ERROR: No Image found in custom kernel!"
              exit 1
          fi

          # Copy DTBs
          sudo mkdir -p "${BOOT_DIR}/dtb"
          find /tmp/kernel-extract -name "*.dtb" -exec sudo cp {} "${BOOT_DIR}/dtb/" \; 2>/dev/null
          find /tmp/kernel-extract -name "*.dtb" -exec sudo cp {} "${BOOT_DIR}/" \; 2>/dev/null
          echo "DTBs copied: $(find ${BOOT_DIR} -name '*.dtb' | wc -l)"

          # Replace modules
          if [ -n "$KVER" ] && [ -d "/mnt/rootfs/lib/modules/${KVER}" ]; then
              sudo rm -rf "/mnt/rootfs/lib/modules/${KVER}"
          fi
          if [ -n "$NEW_KVER" ] && [ -d "/tmp/kernel-extract/lib/modules/${NEW_KVER}" ]; then
              sudo mkdir -p /mnt/rootfs/lib/modules
              sudo cp -a "/tmp/kernel-extract/lib/modules/${NEW_KVER}" /mnt/rootfs/lib/modules/
              echo "Modules replaced: ${NEW_KVER}"
          fi

          # Update extlinux.conf if exists
          if [ -f "${BOOT_DIR}/extlinux/extlinux.conf" ]; then
              sudo sed -i "s|/lib/modules/${KVER}|/lib/modules/${NEW_KVER}|g" "${BOOT_DIR}/extlinux/extlinux.conf" 2>/dev/null || true
              echo "Updated extlinux.conf"
          fi

          # Cleanup
          sudo umount /mnt/boot 2>/dev/null
          sudo umount /mnt/rootfs 2>/dev/null
          sudo losetup -d "${LOOP}" 2>/dev/null
          echo "Build complete"

      - name: Compress and upload
        run: |
          cd /tmp/work
          gzip -9 base.img
          OUTNAME="Armbian_bookworm_arm64_yf023d_$(date +%Y.%m.%d).img.gz"
          mv base.img.gz "${OUTNAME}"
          ls -lh "${OUTNAME}"

      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          tag_name: armbian-yf023d-bookworm
          name: "Armbian bookworm for YF-023D"
          body: |
            Armbian for Young-Feel YF-023D v6 RK3568 Board
            
            Custom kernel: MAE0621 PHY + custom DTS
            Default login: root / 1234
            Install: armbian-install
          files: /tmp/work/Armbian_bookworm_arm64_yf023d_*.img.gz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
