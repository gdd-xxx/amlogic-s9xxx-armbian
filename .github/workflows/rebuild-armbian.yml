name: Build complete Armbian with MAE0621 driver

on:
  workflow_dispatch:

env:
  TZ: Etc/UTC

jobs:
  build-image:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize build environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential flex bison libssl-dev libelf-dev \
            gcc-aarch64-linux-gnu bc python3 \
            device-tree-compiler lz4 libncurses-dev ccache

      - name: Download kernel source and config
        run: |
          cd /tmp
          curl -fsSL -o kernel.tar.gz \
            "https://github.com/ophub/linux-6.12.y/archive/refs/heads/main.tar.gz"
          mkdir -p /tmp/kernel
          tar xzf kernel.tar.gz -C /tmp/kernel --strip-components=1

          cd /tmp/kernel
          curl -fsSL -o .config \
            "https://raw.githubusercontent.com/ophub/kernel/main/kernel-config/release/stable/config-6.12"
          sed -i 's|CONFIG_LOCALVERSION=.*|CONFIG_LOCALVERSION=""|' .config

      - name: Add MAE0621 PHY driver
        run: |
          cd /tmp/kernel
          cp ${{ github.workspace }}/drivers/net/phy/maxio.c drivers/net/phy/

          if ! grep -q "config MAXIO_PHY" drivers/net/phy/Kconfig; then
            cat >> drivers/net/phy/Kconfig << 'KEOF'
          config MAXIO_PHY
              tristate "Maxio MAE0621 PHYs"
              depends on PHYLIB
              help
                Supports the Maxio MAE0621A Q2C and Q3C Gigabit Ethernet PHYs.
          KEOF
          fi

          if ! grep -q "maxio" drivers/net/phy/Makefile; then
            echo "obj-\$(CONFIG_MAXIO_PHY) += maxio.o" >> drivers/net/phy/Makefile
          fi

          scripts/config --enable CONFIG_MAXIO_PHY

      - name: Compile kernel
        run: |
          cd /tmp/kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            -j$(nproc) Image modules dtbs

      - name: Package kernel in ophub format
        run: |
          cd /tmp/kernel
          KERNEL_VER=$(grep "^VERSION" Makefile | head -1 | awk '{print $3}')
          KERNEL_PATCH=$(grep "^PATCHLEVEL" Makefile | head -1 | awk '{print $3}')
          KERNEL_SUB=$(grep "^SUBLEVEL" Makefile | head -1 | awk '{print $3}')
          FULL_VER="${KERNEL_VER}.${KERNEL_PATCH}.${KERNEL_SUB}"
          echo "Kernel version: ${FULL_VER}"

          mkdir -p /tmp/ophub-pkg/${FULL_VER}/{boot,dtb/rockchip,lib/modules/${FULL_VER},header}

          cp arch/arm64/boot/Image /tmp/ophub-pkg/${FULL_VER}/boot/
          find arch/arm64/boot/dts/rockchip -name "*.dtb" -exec cp {} /tmp/ophub-pkg/${FULL_VER}/dtb/rockchip/ \;
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            INSTALL_MOD_PATH=/tmp/ophub-pkg/${FULL_VER}/lib modules_install

          cd /tmp/ophub-pkg
          tar czf "${FULL_VER}.tar.gz" ${FULL_VER}
          ls -lh "${FULL_VER}.tar.gz"

          echo "KERNEL_VER=${FULL_VER}" >> ${GITHUB_ENV}

      - name: Upload kernel to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: kernel_stable
          name: "Custom kernel with MAE0621"
          body: "Kernel ${{ env.KERNEL_VER }} with MAE0621 Ethernet PHY driver"
          files: /tmp/ophub-pkg/${{ env.KERNEL_VER }}.tar.gz
          allow_updates: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-armbian:
    needs: build-image
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk
        id: disk
        run: |
          root_avail=$(df --block-size=1G / | tail -1 | awk '{print $4}')
          root_size=$(( root_avail - 4 ))
          [[ "${root_size}" -gt 0 ]] || { echo "Error: Insufficient space"; exit 1; }
          sudo truncate -s "${root_size}"G /root.img
          build_dev=$(sudo losetup --find --show /root.img)
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 "${build_dev}"
          sudo mkdir -p /builder
          sudo mount "${build_dev}" /builder
          sudo chown -R runner:runner /builder
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Download Armbian trunk image
        id: down
        working-directory: /builder
        run: |
          armbian_buildpath="build/output/images"
          mkdir -p "${armbian_buildpath}"
          ln -sf /builder/build ${{ github.workspace }}/build
          ln -sf /builder/build /home/runner/work/_actions/ophub/amlogic-s9xxx-armbian/main/build

          latest_version=$(curl -s \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/ophub/amlogic-s9xxx-armbian/releases?per_page=10" | \
              jq -r '
              [.[] | select(.tag_name | contains("bookworm") and contains("server"))] |
              map(.assets[] | select(.name | contains("-trunk_") and endswith(".img.gz"))) |
              sort_by(.updated_at) | reverse | .[0] |
              {url: .browser_download_url, name: .name}')

          if [[ -z "${latest_version}" || "${latest_version}" == "null" ]]; then
              echo "Error: No Armbian image found"
              exit 1
          fi

          armbian_url="$(echo ${latest_version} | jq -r '.url')"
          armbian_filename="$(echo ${latest_version} | jq -r '.name')"

          echo "Downloading: ${armbian_filename}"
          curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               "${armbian_url}" -o "${armbian_buildpath}/${armbian_filename}"

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Get kernel version from release
        id: kver
        run: |
          # Get the exact kernel version from our kernel_stable release
          KERNEL_VER=$(curl -s \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/kernel_stable" | \
              jq -r '.assets[0].name' | sed 's/.tar.gz$//')
          echo "Kernel version: ${KERNEL_VER}"
          echo "kernel_ver=${KERNEL_VER}" >> ${GITHUB_OUTPUT}

      - name: Build Armbian with custom kernel
        uses: ophub/amlogic-s9xxx-armbian@main
        if: ${{ steps.down.outputs.status == 'success' && !cancelled() }}
        with:
          build_target: armbian
          armbian_path: build/output/images/*.img.gz
          armbian_board: rock-3b
          armbian_kernel: ${{ steps.kver.outputs.kernel_ver }}
          auto_kernel: true
          kernel_repo: ${{ github.repository }}
          kernel_usage: stable
          armbian_fstype: ext4
          builder_name: yf023d

      - name: Upload
        uses: softprops/action-gh-release@v1
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag_name: armbian-yf023d-bookworm
          name: "Armbian bookworm for YF-023D (RK3568 + MAE0621)"
          body: |
            Armbian for Young-Feel YF-023D v6 RK3568
            
            Based on Rock-3B (correct RK3568 u-boot)
            Kernel: ${{ steps.kver.outputs.kernel_ver }} with MAE0621 Ethernet PHY driver
            
            Default: root / 1234
            Install: armbian-install
          files: ${{ env.PACKAGED_OUTPUTPATH }}/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
