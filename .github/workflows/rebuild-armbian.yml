name: Build Armbian for YF-023D

on:
  workflow_dispatch:

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Armbian base image
        run: |
          mkdir -p /tmp/work
          # Download bookworm trunk image from ophub
          curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/ophub/amlogic-s9xxx-armbian/releases?per_page=3" | \
            jq -r '
              [.[] | select(.tag_name | contains("bookworm") and contains("server"))] |
              map(.assets[] | select(.name | contains("-trunk_") and contains("arm64") and endswith(".img.gz"))) |
              sort_by(.updated_at) | reverse | .[0].browser_download_url' | \
            xargs -I{} curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "{}" -o /tmp/work/base.img.gz

          ls -lh /tmp/work/base.img.gz
          gzip -d /tmp/work/base.img.gz
          echo "Base image ready"

      - name: Download and extract custom kernel
        run: |
          mkdir -p /tmp/kernel-pkg
          curl -fsSL -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://github.com/gdd-xxx/amlogic-s9xxx-armbian/releases/download/kernel-yf023d/kernel-rk3568-yf023d.tar.gz" \
            -o /tmp/kernel-pkg/custom.tar.gz

          ls -lh /tmp/kernel-pkg/custom.tar.gz
          tar xzf /tmp/kernel-pkg/custom.tar.gz -C /tmp/kernel-pkg/
          echo "Custom kernel extracted:"
          find /tmp/kernel-pkg -type f | head -30
          echo "---"
          # Find Image
          IMAGE=$(find /tmp/kernel-pkg -name "Image" -o -name "*.Image" | head -1)
          echo "Image: ${IMAGE}"
          # Find DTBs
          find /tmp/kernel-pkg -name "*.dtb" | head -10
          # Find modules
          ls /tmp/kernel-pkg/lib/modules/ 2>/dev/null || echo "No modules dir at lib/modules"
          find /tmp/kernel-pkg -path "*/modules/*" -name "modules.dep" | head -5

      - name: Build custom Armbian image
        run: |
          IMG="/tmp/work/base.img.gz"
          [ -f "/tmp/work/base.img" ] && IMG="/tmp/work/base.img"

          # Get loop device
          sudo losetup -fP "${IMG}"
          LOOP=$(sudo losetup -j "${IMG}" | awk '{print $1}')
          echo "Loop device: ${LOOP}"

          # List partitions
          sudo fdisk -l "${IMG}"
          sudo partprobe "${LOOP}"

          # Mount boot partition (partition 1) and rootfs (partition 2)
          sudo mkdir -p /mnt/boot /mnt/rootfs

          # Try to identify partitions
          sudo mount ${LOOP}p1 /mnt/boot 2>/dev/null || sudo mount ${LOOP}1 /mnt/boot 2>/dev/null || true
          sudo mount ${LOOP}p2 /mnt/rootfs 2>/dev/null || sudo mount ${LOOP}2 /mnt/rootfs 2>/dev/null || true

          echo "Boot partition:"
          ls -la /mnt/boot/ 2>/dev/null | head -20
          echo "Rootfs partition:"
          ls -la /mnt/rootfs/ 2>/dev/null | head -20

          # Find kernel version in existing image
          KVER=$(ls /mnt/rootfs/lib/modules/ 2>/dev/null | head -1)
          echo "Existing kernel version: ${KVER}"

          # Find and replace kernel Image
          BOOT_DIR=$(find /mnt/boot -name "extlinux" -o -name "*.scr" -o -name "Image" 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
          [ -z "$BOOT_DIR" ] && BOOT_DIR="/mnt/boot"
          echo "Boot dir: ${BOOT_DIR}"

          # Backup existing kernel
          [ -f "${BOOT_DIR}/Image" ] && sudo cp "${BOOT_DIR}/Image" "${BOOT_DIR}/Image.bak" 2>/dev/null || true

          # Copy new kernel Image
          NEW_IMAGE=$(find /tmp/kernel-pkg -name "Image" | head -1)
          if [ -n "$NEW_IMAGE" ]; then
              sudo cp "$NEW_IMAGE" "${BOOT_DIR}/Image"
              echo "Copied new Image to ${BOOT_DIR}/"
          fi

          # Copy DTBs
          sudo mkdir -p ${BOOT_DIR}/dtb
          find /tmp/kernel-pkg -name "*.dtb" -exec sudo cp {} ${BOOT_DIR}/dtb/ \; 2>/dev/null || true
          find /tmp/kernel-pkg -name "*.dtb" -exec sudo cp {} ${BOOT_DIR}/ \; 2>/dev/null || true
          echo "DTBs copied"

          # Replace modules
          if [ -n "$KVER" ]; then
              sudo rm -rf /mnt/rootfs/lib/modules/${KVER}
          fi
          NEW_MODULES=$(find /tmp/kernel-pkg -path "*/lib/modules/*" -maxdepth 5 -type d | head -1 | sed 's|/lib/modules/.*||')
          if [ -d "/tmp/kernel-pkg/lib/modules" ]; then
              sudo cp -a /tmp/kernel-pkg/lib/modules /mnt/rootfs/lib/
              echo "Modules copied"
          fi

          echo "Boot dir contents:"
          ls -la ${BOOT_DIR}/ 2>/dev/null

          # Cleanup
          sudo umount /mnt/boot 2>/dev/null || true
          sudo umount /mnt/rootfs 2>/dev/null || true
          sudo losetup -d "${LOOP}" 2>/dev/null || true

      - name: Compress and upload
        run: |
          cd /tmp/work
          gzip -9 base.img
          mv base.img.gz "Armbian_bookworm_arm64_yf023d_$(date +%Y.%m.%d).img.gz"
          ls -lh *.img.gz

      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          tag_name: armbian-yf023d-bookworm
          name: "Armbian bookworm for YF-023D"
          body: |
            Armbian image for Young-Feel YF-023D v6 RK3568 Board
            
            Custom kernel with MAE0621 Ethernet PHY driver + custom DTS.
            
            Default login: root / 1234
          files: /tmp/work/Armbian_bookworm_arm64_yf023d_*.img.gz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
