name: Build Armbian for YF-023D

on:
  workflow_dispatch:

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk
        id: disk
        run: |
          root_avail=$(df --block-size=1G / | tail -1 | awk '{print $4}')
          root_size=$(( root_avail - 4 ))
          [[ "${root_size}" -gt 0 ]] || { echo "Error: Insufficient space"; exit 1; }
          sudo truncate -s "${root_size}"G /root.img
          build_dev=$(sudo losetup --find --show /root.img)
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 "${build_dev}"
          sudo mkdir -p /builder
          sudo mount "${build_dev}" /builder
          sudo chown -R runner:runner /builder
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Download Armbian trunk image
        id: down
        working-directory: /builder
        run: |
          armbian_buildpath="build/output/images"
          mkdir -p "${armbian_buildpath}"
          ln -sf /builder/build ${{ github.workspace }}/build
          ln -sf /builder/build /home/runner/work/_actions/ophub/amlogic-s9xxx-armbian/main/build

          latest_version=$(curl -s \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/ophub/amlogic-s9xxx-armbian/releases?per_page=10" | \
              jq -r '
              [.[] | select(.tag_name | contains("bookworm") and contains("server"))] |
              map(.assets[] | select(.name | contains("-trunk_") and endswith(".img.gz"))) |
              sort_by(.updated_at) | reverse | .[0] |
              {url: .browser_download_url, name: .name}')

          if [[ -z "${latest_version}" || "${latest_version}" == "null" ]]; then
              echo "Error: No Armbian image found"
              exit 1
          fi

          armbian_url="$(echo ${latest_version} | jq -r '.url')"
          armbian_filename="$(echo ${latest_version} | jq -r '.name')"

          echo "Downloading: ${armbian_filename}"
          curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               "${armbian_url}" -o "${armbian_buildpath}/${armbian_filename}"

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Build Armbian with rock-3b board
        uses: ophub/amlogic-s9xxx-armbian@main
        if: ${{ steps.down.outputs.status == 'success' && !cancelled() }}
        with:
          build_target: armbian
          armbian_path: build/output/images/*.img.gz
          armbian_board: rock-3b
          armbian_kernel: 6.12.y
          auto_kernel: true
          kernel_repo: ophub/kernel
          kernel_usage: stable
          armbian_fstype: ext4
          builder_name: yf023d

      - name: Replace DTB in rebuilt image
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        run: |
          IMG_GZ=$(find ${{ env.PACKAGED_OUTPUTPATH }} -name "*.img.gz" | head -1)
          if [ -z "$IMG_GZ" ]; then
            echo "ERROR: No rebuilt image found"
            exit 1
          fi

          cp "${IMG_GZ}" /tmp/rebuilt.img.gz
          gzip -d /tmp/rebuilt.img.gz

          LOOP=$(sudo losetup -fP --show /tmp/rebuilt.img)
          sudo partprobe "${LOOP}"
          sleep 2

          # Find ext4 partition
          ROOT_PART=""
          for p in ${LOOP}p1 ${LOOP}p2; do
            if [ -b "$p" ]; then
              FSTYPE=$(sudo blkid -s TYPE -o value "$p" 2>/dev/null)
              if [ "$FSTYPE" = "ext4" ]; then
                ROOT_PART="$p"
              fi
            fi
          done

          if [ -z "$ROOT_PART" ]; then
            echo "ERROR: No ext4 partition"
            sudo losetup -d "${LOOP}"
            exit 1
          fi

          sudo mkdir -p /mnt/rootfs
          sudo mount "${ROOT_PART}" /mnt/rootfs
          BOOT_DIR="/mnt/rootfs/boot"

          # Download kernel headers for DTS preprocessing
          sudo apt-get install -y gcc device-tree-compiler >/dev/null 2>&1
          KERNEL_VER=$(sudo ls /mnt/rootfs/lib/modules/ | head -1)
          echo "Kernel: ${KERNEL_VER}"

          # Get dt-bindings headers from kernel source
          mkdir -p /tmp/dt-bindings
          curl -fsSL "https://raw.githubusercontent.com/torvalds/linux/v${KERNEL_VER}/include/dt-bindings/gpio/gpio.h" \
            -o /tmp/dt-bindings/gpio.h 2>/dev/null || true
          mkdir -p /tmp/dt-bindings/gpio /tmp/dt-bindings/leds /tmp/dt-bindings/pinctrl /tmp/dt-bindings/soc

          # Download all needed dt-bindings
          for f in "gpio/gpio.h" "leds/common.h" "pinctrl/rockchip.h" "soc/rockchip,vop2.h"; do
            curl -fsSL "https://raw.githubusercontent.com/torvalds/linux/v${KERNEL_VER}/include/dt-bindings/${f}" \
              -o "/tmp/dt-bindings/${f}" 2>/dev/null || true
          done

          # Also need the rk3568.dtsi from the image's dtb directory
          # Copy from the image itself
          sudo cp ${BOOT_DIR}/dtb/rockchip/rk3568.dtsi /tmp/dt-bindings/ 2>/dev/null || true

          # Compile DTS
          DTS_SRC=$(find ${{ github.workspace }} -name "rk3568-yf-023d-v6.dts" 2>/dev/null | head -1)
          cpp -nostdinc -I /tmp/dt-bindings -I /tmp/dt-bindings/gpio -D__DTS__ -x assembler-with-cpp "${DTS_SRC}" | \
            dtc -I dts -O dtb -i /tmp/dt-bindings -o /tmp/rk3568-yf-023d-v6.dtb -

          if [ ! -s /tmp/rk3568-yf-023d-v6.dtb ]; then
            echo "ERROR: DTB compilation failed"
            sudo umount /mnt/rootfs
            sudo losetup -d "${LOOP}"
            exit 1
          fi
          echo "DTB compiled: $(ls -lh /tmp/rk3568-yf-023d-v6.dtb)"

          # Install DTB
          sudo cp /tmp/rk3568-yf-023d-v6.dtb "${BOOT_DIR}/dtb/rockchip/"

          # Update boot config
          for conf in "${BOOT_DIR}/armbianEnv.txt" "${BOOT_DIR}/extlinux/extlinux.conf"; do
            if [ -f "$conf" ]; then
              sudo sed -i 's/rk3568-rock-3b.dtb/rk3568-yf-023d-v6.dtb/g' "$conf"
              echo "Updated: $conf"
            fi
          done

          sudo umount /mnt/rootfs
          sudo losetup -d "${LOOP}"

          gzip -9 /tmp/rebuilt.img
          cp /tmp/rebuilt.img.gz "${IMG_GZ}"
          echo "Done"

      - name: Upload
        uses: softprops/action-gh-release@v1
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag_name: armbian-yf023d-bookworm
          name: "Armbian bookworm for YF-023D (RK3568)"
          body: |
            Armbian for Young-Feel YF-023D v6 RK3568
            
            Based on Rock-3B (correct RK3568 u-boot)
            Custom DTB: rk3568-yf-023d-v6.dtb
            Kernel: 6.12.y stable
            
            Default: root / 1234
            Install: armbian-install
          files: ${{ env.PACKAGED_OUTPUTPATH }}/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
