name: Build full Armbian for YF-023D

on:
  workflow_dispatch:
    inputs:
      set_release:
        description: "OS Release"
        required: false
        default: "bookworm"
        type: choice
        options:
          - trixie
          - bookworm
          - resolute
          - noble
      armbian_edition:
        description: "Image edition"
        required: false
        default: "server"
        type: choice
        options:
          - server
          - desktop
      armbian_fstype:
        description: "Root filesystem type"
        required: false
        default: "ext4"
        type: choice
        options:
          - ext4
          - btrfs

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk
        id: disk
        run: |
          root_avail=$(df --block-size=1G / | tail -1 | awk '{print $4}')
          root_size=$(( root_avail - 4 ))
          [[ "${root_size}" -gt 0 ]] || { echo "Error: Insufficient space"; exit 1; }
          sudo truncate -s "${root_size}"G /root.img
          build_dev=$(sudo losetup --find --show /root.img)
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 "${build_dev}"
          sudo mkdir -p /builder
          sudo mount "${build_dev}" /builder
          sudo chown -R runner:runner /builder
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Get latest Armbian base image
        id: down
        working-directory: /builder
        if: ${{ steps.init.outputs.status == 'success' && !cancelled() }}
        run: |
          armbian_buildpath="build/output/images"
          mkdir -p "${armbian_buildpath}"
          ln -sf /builder/build ${{ github.workspace }}/build

          # Download latest Armbian from official releases
          latest_version=$(curl -s \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/armbian/build/releases?per_page=10" | \
              jq -r --arg RTK "Armbian_${{ inputs.set_release }}_arm64_" \
              '[.[] | select(.tag_name | contains($RTK))] |
              map(.assets[] | select(.name | contains("-trunk_") and endswith(".img.gz"))) |
              sort_by(.updated_at) | reverse | .[0] |
              {url: .browser_download_url, name: .name}')

          if [[ -z "${latest_version}" || "${latest_version}" == "null" ]]; then
              echo "No official Armbian found, trying ophub releases..."
              latest_version=$(curl -s \
                  -H "Accept: application/vnd.github+json" \
                  -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  "https://api.github.com/repos/armbian/build/releases/tags/v25.02" | \
                  jq -r '.assets[] | select(.name | contains("arm64") and contains("${{ inputs.set_release }}")) | select(.name | endswith(".img.gz")) | {url: .browser_download_url, name: .name}' | head -1)
          fi

          if [[ -z "${latest_version}" || "${latest_version}" == "null" ]]; then
              echo "Downloading Armbian minimal image..."
              curl -fsSL -o "${armbian_buildpath}/armbian.img.gz" \
                "https://dl.armbian.com/rockchip-rk3568/Armbian_${{ inputs.set_release }}_trunk_6.12.50_arm64.img.gz"
          else
              armbian_url="$(echo ${latest_version} | jq -r '.url')"
              armbian_filename="$(echo ${latest_version} | jq -r '.name')"
              echo "Downloading: ${armbian_filename}"
              curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                   "${armbian_url}" -o "${armbian_buildpath}/${armbian_filename}"
          fi

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Build custom Armbian image
        uses: ophub/amlogic-s9xxx-armbian@main
        if: ${{ steps.down.outputs.status == 'success' && !cancelled() }}
        with:
          build_target: armbian
          armbian_path: build/output/images/*.img.gz
          armbian_board: rk3568
          armbian_kernel: 6.12.y
          auto_kernel: true
          kernel_repo: gdd-xxx/kernel
          kernel_usage: stable
          armbian_fstype: ${{ inputs.armbian_fstype }}
          builder_name: yf023d

      - name: Upload Armbian image
        uses: softprops/action-gh-release@v1
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag_name: armbian-yf023d-${{ inputs.set_release }}
          name: "Armbian ${{ inputs.set_release }} for YF-023D RK3568"
          body: |
            Armbian image for Young-Feel YF-023D v6 RK3568 Board
            
            Features:
            - Custom kernel with MAE0621 Ethernet PHY driver
            - HDMI output support
            - WiFi/BT support
            - eMMC/SD/NAND support
            
            Default login: root / 1234
            Install to eMMC: armbian-install
          files: ${{ env.PACKAGED_OUTPUTPATH }}/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
