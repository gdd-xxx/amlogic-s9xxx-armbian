name: Build complete Armbian with MAE0621 driver

on:
  workflow_dispatch:

env:
  TZ: Etc/UTC

jobs:
  build-image:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize build environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential flex bison libssl-dev libelf-dev \
            gcc-aarch64-linux-gnu bc python3 \
            device-tree-compiler lz4 libncurses-dev

      - name: Download kernel source and config
        run: |
          cd /tmp
          curl -fsSL -o kernel.tar.gz \
            "https://github.com/ophub/linux-6.12.y/archive/refs/heads/main.tar.gz"
          mkdir -p /tmp/kernel
          tar xzf kernel.tar.gz -C /tmp/kernel --strip-components=1
          cd /tmp/kernel
          curl -fsSL -o .config \
            "https://raw.githubusercontent.com/ophub/kernel/main/kernel-config/release/stable/config-6.12"
          sed -i 's|CONFIG_LOCALVERSION=.*|CONFIG_LOCALVERSION=""|' .config

      - name: Add MAE0621 PHY driver
        run: |
          cd /tmp/kernel
          cp ${{ github.workspace }}/drivers/net/phy/maxio.c drivers/net/phy/
          if ! grep -q "config MAXIO_PHY" drivers/net/phy/Kconfig; then
            cat >> drivers/net/phy/Kconfig << 'KEOF'
          config MAXIO_PHY
              tristate "Maxio MAE0621 PHYs"
              depends on PHYLIB
              help
                Supports the Maxio MAE0621A Q2C and Q3C Gigabit Ethernet PHYs.
          KEOF
          fi
          if ! grep -q "maxio" drivers/net/phy/Makefile; then
            echo "obj-\$(CONFIG_MAXIO_PHY) += maxio.o" >> drivers/net/phy/Makefile
          fi
          scripts/config --enable CONFIG_MAXIO_PHY

      - name: Compile kernel
        run: |
          cd /tmp/kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) Image modules dtbs

      - name: Package kernel
        run: |
          cd /tmp/kernel
          FULL_VER=$(grep "^VERSION\|^PATCHLEVEL\|^SUBLEVEL" Makefile | awk '{print $3}' | paste -sd'.' -)
          echo "Kernel: ${FULL_VER}"
          mkdir -p /tmp/output/{boot,dtb/rockchip,lib/modules}
          cp arch/arm64/boot/Image /tmp/output/boot/
          find arch/arm64/boot/dts/rockchip -name "*.dtb" -exec cp {} /tmp/output/dtb/rockchip/ \;
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- INSTALL_MOD_PATH=/tmp/output/lib modules_install
          cd /tmp/output
          tar czf ${{ github.workspace }}/kernel-${FULL_VER}.tar.gz .
          echo "KERNEL_VER=${FULL_VER}" >> ${GITHUB_ENV}

      - name: Upload kernel
        uses: softprops/action-gh-release@v1
        with:
          tag_name: kernel_stable
          name: "Kernel ${{ env.KERNEL_VER }} with MAE0621"
          files: ${{ github.workspace }}/kernel-${{ env.KERNEL_VER }}.tar.gz
          allow_updates: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-armbian:
    needs: build-image
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Armbian base + our kernel
        run: |
          mkdir -p /tmp/work

          # Download Armbian trunk image
          echo "Downloading Armbian base image..."
          TAG="Armbian_bookworm_arm64_server_2026.06"
          FILE="Armbian_26.05.0-trunk_bookworm_arm64_6.18.33.img.gz"
          curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "https://github.com/ophub/amlogic-s9xxx-armbian/releases/download/${TAG}/${FILE}" \
            -o /tmp/work/base.img.gz
          echo "Base image: $(ls -lh /tmp/work/base.img.gz | awk '{print $5}')"

          # Download our custom kernel
          echo "Downloading custom kernel..."
          KERNEL_URL=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/kernel_stable" | \
            jq -r '.assets[0].browser_download_url')
          echo "Kernel URL: ${KERNEL_URL}"
          curl -fsSL -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "${KERNEL_URL}" -o /tmp/work/kernel.tar.gz
          echo "Kernel: $(ls -lh /tmp/work/kernel.tar.gz | awk '{print $5}')"

          # Extract kernel
          mkdir -p /tmp/kernel
          tar xzf /tmp/work/kernel.tar.gz -C /tmp/kernel/
          echo "Kernel contents:"
          ls -la /tmp/kernel/
          ls -la /tmp/kernel/boot/ 2>/dev/null
          ls /tmp/kernel/dtb/rockchip/ 2>/dev/null | head -5
          ls /tmp/kernel/lib/modules/ 2>/dev/null

      - name: Get Rock-3B u-boot files
        run: |
          mkdir -p /tmp/uboot
          # Download from ophub/u-boot repo
          curl -fsSL -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://github.com/ophub/u-boot/raw/main/rockchip/rock-3b/idbloader.img" \
            -o /tmp/uboot/idbloader.img
          curl -fsSL -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://github.com/ophub/u-boot/raw/main/rockchip/rock-3b/u-boot.itb" \
            -o /tmp/uboot/u-boot.itb
          echo "U-Boot files:"
          ls -lh /tmp/uboot/

      - name: Build custom Armbian image
        run: |
          # Decompress base image
          gzip -d /tmp/work/base.img.gz
          IMG="/tmp/work/base.img"

          # Get partition info
          parted -s "${IMG}" unit s print

          # Set up loop device
          LOOP=$(sudo losetup -fP --show "${IMG}")
          sudo partprobe "${LOOP}"
          sleep 2

          # Find partitions
          ls ${LOOP}* 2>/dev/null

          # Mount partitions (single ext4 layout)
          sudo mkdir -p /mnt/rootfs
          # Try partition 1 first, then fallback
          sudo mount "${LOOP}p1" /mnt/rootfs 2>/dev/null || sudo mount "${LOOP}1" /mnt/rootfs 2>/dev/null

          ROOT_UUID=$(sudo blkid -s UUID -o value "${LOOP}p1" 2>/dev/null || sudo blkid -s UUID -o value "${LOOP}1" 2>/dev/null)
          echo "ROOT_UUID: ${ROOT_UUID}"

          BOOT_DIR="/mnt/rootfs/boot"
          echo "Boot dir contents:"
          sudo ls -la "${BOOT_DIR}/" | head -20

          # Find existing kernel version
          KVER=$(sudo ls /mnt/rootfs/lib/modules/ 2>/dev/null | head -1)
          echo "Existing kernel: ${KVER}"
          NEW_KVER=$(ls /tmp/kernel/lib/modules/ 2>/dev/null | head -1)
          echo "New kernel: ${NEW_KVER}"

          # Install u-boot to image (write at sector 64 and 16384)
          echo "Installing u-boot..."
          sudo dd if=/tmp/uboot/idbloader.img of="${IMG}" conv=fsync,notrunc bs=512 seek=64
          sudo dd if=/tmp/uboot/u-boot.itb of="${IMG}" conv=fsync,notrunc bs=512 seek=16384
          echo "U-Boot installed"

          # Replace kernel Image
          if [ -f "${BOOT_DIR}/Image" ]; then
            sudo mv "${BOOT_DIR}/Image" "${BOOT_DIR}/Image.old"
          fi
          sudo cp /tmp/kernel/boot/Image "${BOOT_DIR}/Image"
          echo "Kernel Image replaced"

          # Replace DTBs
          sudo mkdir -p "${BOOT_DIR}/dtb/rockchip"
          sudo cp /tmp/kernel/dtb/rockchip/*.dtb "${BOOT_DIR}/dtb/rockchip/" 2>/dev/null || true
          echo "DTBs: $(sudo find ${BOOT_DIR} -name '*.dtb' | wc -l)"

          # Replace modules
          if [ -n "$KVER" ] && [ -d "/mnt/rootfs/lib/modules/${KVER}" ]; then
            sudo rm -rf "/mnt/rootfs/lib/modules/${KVER}"
          fi
          if [ -n "$NEW_KVER" ] && [ -d "/tmp/kernel/lib/modules/${NEW_KVER}" ]; then
            sudo cp -a "/tmp/kernel/lib/modules/${NEW_KVER}" /mnt/rootfs/lib/modules/
            echo "Modules replaced: ${NEW_KVER}"
          fi

          # Update boot config - point to rock-3b DTB (compatible with YF-023D)
          for conf in "${BOOT_DIR}/armbianEnv.txt" "${BOOT_DIR}/extlinux/extlinux.conf"; do
            if [ -f "$conf" ]; then
              echo "=== $conf ==="
              cat "$conf"
              echo "==="
            fi
          done

          # Write new extlinux.conf for boot
          sudo mkdir -p "${BOOT_DIR}/extlinux"
          sudo bash -c "cat > ${BOOT_DIR}/extlinux/extlinux.conf" << 'EXTEOF'
          LABEL Armbian
            LINUX /boot/Image
            INITRD /boot/uInitrd
            FDT /boot/dtb/rockchip/rk3568-rock-3b.dtb
            APPEND root=UUID=ROOTUUID_PLACEHOLDER console=ttyS2,1500000 console=tty1 rootwait rootfstype=ext4
          EXTEOF
          sudo sed -i "s|ROOTUUID_PLACEHOLDER|${ROOT_UUID}|" "${BOOT_DIR}/extlinux/extlinux.conf"
          echo "extlinux.conf:"
          cat "${BOOT_DIR}/extlinux/extlinux.conf"

          # Cleanup
          sudo umount /mnt/rootfs
          sudo losetup -d "${LOOP}"

          # Compress
          gzip -9 /tmp/work/base.img
          echo "Build complete"

      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          tag_name: armbian-yf023d-bookworm
          name: "Armbian bookworm for YF-023D (RK3568 + MAE0621)"
          body: |
            Armbian for Young-Feel YF-023D v6 RK3568
            
            Custom kernel: 6.12.y with MAE0621 Ethernet PHY driver
            U-Boot: Rock-3B (correct RK3568 u-boot)
            DTB: Rock-3B (compatible with YF-023D)
            
            Default: root / 1234
            Install: armbian-install
          files: /tmp/work/base.img.gz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
